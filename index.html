  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════════
       TOKENS
       ══════════════════════════════════════════════ */
    :root {
      --black: #000;
      --white: #fff;
      --grey-100: #e8e8e8;
      --grey-200: #d0d0d0;
      --grey-400: #888;
      --grey-600: #555;
      --grey-800: #222;
      --grey-900: #111;
      --accent: #FF828A;
      --f-serif: 'Instrument Serif', Georgia, serif;
      --f-sans: 'Space Grotesk', -apple-system, sans-serif;
      --f-mono: 'Space Mono', monospace;
      --ease: cubic-bezier(.16,1,.3,1);
    }

    /* ══════════════════════════════════════════════
       RESET
       ══════════════════════════════════════════════ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:auto}
    body{
      background:var(--black);color:var(--white);
      font-family:var(--f-sans);
      overflow:hidden;height:100vh;height:100dvh;
      -webkit-font-smoothing:antialiased;
      cursor:none;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:0;
      background:url('bg.jpg') center/cover no-repeat;
      opacity:.18;
      transition:opacity .6s var(--ease);
    }
    body.on-hem::before{
      opacity:.25;
      pointer-events:none;
    }
    #app{position:relative;z-index:1}
    ::selection{background:var(--white);color:var(--black)}

    /* ══════════════════════════════════════════════
       CURSOR
       ══════════════════════════════════════════════ */
    #cursor{
      position:fixed;top:0;left:0;z-index:9999;
      width:12px;height:12px;background:var(--white);border-radius:50%;
      pointer-events:none;transform:translate(-50%,-50%);
      transition:width .3s var(--ease),height .3s var(--ease);
      mix-blend-mode:difference;
    }
    #cursor.expand{width:60px;height:60px}

    /* ══════════════════════════════════════════════
       NOISE
       ══════════════════════════════════════════════ */
    body::after{
      content:'';position:fixed;inset:0;z-index:9998;
      pointer-events:none;opacity:.035;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:128px 128px;
    }

    /* ══════════════════════════════════════════════
       NAV
       ══════════════════════════════════════════════ */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      padding:24px 48px;display:flex;align-items:center;justify-content:space-between;
      mix-blend-mode:difference;
    }
    .nav-logo{
      font-family:var(--f-mono);font-size:.8rem;font-weight:700;
      color:var(--white);text-decoration:none;
      letter-spacing:.15em;text-transform:uppercase;
    }
    .nav-links{display:flex;gap:32px;list-style:none}
    .nav-links a{
      font-family:var(--f-mono);font-size:.6rem;font-weight:400;
      letter-spacing:.18em;text-transform:uppercase;
      color:var(--white);text-decoration:none;
      position:relative;padding-bottom:2px;
    }
    .nav-links a::after{
      content:'';position:absolute;bottom:0;left:0;
      width:0;height:1px;background:var(--white);
      transition:width .4s var(--ease);
    }
    .nav-links a:hover::after{width:100%}

    /* ── Hamburger ── */
    .nav-burger{
      display:none;flex-direction:column;justify-content:center;gap:5px;
      background:none;border:none;cursor:none;padding:4px;
      position:relative;z-index:101;
    }
    .nav-burger span{
      display:block;width:22px;height:1.5px;background:var(--white);
      transition:transform .35s var(--ease),opacity .2s;
      transform-origin:center;
    }
    nav.menu-open .nav-burger span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
    nav.menu-open .nav-burger span:nth-child(2){opacity:0;transform:scaleX(0)}
    nav.menu-open .nav-burger span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

    /* ══════════════════════════════════════════════
       APP / PAGE ROUTER
       ══════════════════════════════════════════════ */
    #app{
      position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;
    }
    .page{
      display:none;
      position:absolute;inset:0;
      overflow-y:auto;overflow-x:hidden;
      scrollbar-width:thin;
      scrollbar-color:var(--grey-600) transparent;
    }
    .page.active{
      display:block;
    }
    /* staggered entry animations — only fire when page is active */
    @keyframes fi-in{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:none}
    }
    .page.active .fi{animation:fi-in .55s var(--ease) both}
    .page.active .d1{animation-delay:.07s}
    .page.active .d2{animation-delay:.14s}
    .page.active .d3{animation-delay:.21s}
    .page.active .d4{animation-delay:.28s}
    .page.active .d5{animation-delay:.35s}
    .page.active .d6{animation-delay:.42s}
    .page.active .d7{animation-delay:.49s}
    .page.active .d8{animation-delay:.56s}
    .page.active .d9{animation-delay:.63s}

    /* ══════════════════════════════════════════════
       PAGE INNER LAYOUT
       ══════════════════════════════════════════════ */
    .page-center{
      min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
      justify-content:center;align-items:center;text-align:center;
      padding:120px 48px 80px;position:relative;
    }
    .page-content{
      max-width:780px;margin:0 auto;
      padding:120px 48px 100px;
    }
    .page-bg{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      font-family:var(--f-serif);font-size:clamp(18rem,38vw,48rem);
      font-style:italic;font-weight:400;color:var(--grey-900);
      line-height:1;pointer-events:none;user-select:none;opacity:.4;
    }

    /* ══════════════════════════════════════════════
       TYPOGRAPHY
       ══════════════════════════════════════════════ */
    .label{
      font-family:var(--f-mono);font-size:.55rem;
      letter-spacing:.4em;text-transform:uppercase;color:var(--grey-400);
      display:flex;align-items:center;gap:16px;margin-bottom:16px;
    }
    .label::before{content:'';display:block;width:40px;height:1px;background:var(--grey-600)}
    .title{
      font-family:var(--f-serif);
      font-size:clamp(3rem,7vw,8rem);font-weight:400;font-style:italic;
      line-height:.92;letter-spacing:-.03em;margin-bottom:32px;
    }
    .title-sm{
      font-family:var(--f-serif);
      font-size:clamp(2rem,4vw,4rem);font-weight:400;font-style:italic;
      line-height:.95;letter-spacing:-.02em;margin-bottom:40px;
    }
    .subtitle{
      font-family:var(--f-mono);font-size:.65rem;
      letter-spacing:.3em;text-transform:uppercase;color:var(--grey-400);
    }
    .prose{
      font-family:var(--f-sans);font-size:.92rem;
      line-height:1.8;color:var(--grey-200);margin-bottom:20px;
    }
    .prose strong{color:var(--white);font-weight:600}
    .prose-serif{
      font-family:var(--f-serif);
      font-size:clamp(1.1rem,1.6vw,1.35rem);
      font-weight:400;line-height:1.7;color:var(--grey-200);
      margin-bottom:20px;
    }
    .prose-serif strong{color:var(--white);font-weight:400}

    /* ══════════════════════════════════════════════
       HERO
       ══════════════════════════════════════════════ */
    .hero-name{
      font-family:var(--f-serif);
      font-size:clamp(5rem,14vw,14rem);font-weight:400;font-style:italic;
      line-height:.85;letter-spacing:-.04em;margin-bottom:28px;
    }
    .hero-name span{display:inline-block}

    /* ══════════════════════════════════════════════
       BUTTONS
       ══════════════════════════════════════════════ */
    .btn{
      display:inline-flex;align-items:center;gap:10px;
      padding:14px 32px;font-family:var(--f-mono);font-size:.65rem;
      font-weight:700;letter-spacing:.15em;text-transform:uppercase;
      text-decoration:none;transition:all .4s var(--ease);
    }
    .btn-w{background:var(--white);color:var(--black)}
    .btn-w:hover{transform:translateY(-2px);box-shadow:0 20px 60px rgba(255,255,255,.15)}
    .btn-o{background:transparent;color:var(--white);border:1px solid var(--grey-600)}
    .btn-o:hover{border-color:var(--white);transform:translateY(-2px)}
    .btn-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:40px}

    /* ══════════════════════════════════════════════
       NAV GRID (hem-sida)
       ══════════════════════════════════════════════ */
    .home-grid{
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:2px;width:100%;max-width:900px;margin-top:56px;
    }
    .home-card{
      padding:36px 28px;background:var(--grey-900);
      text-decoration:none;color:inherit;
      position:relative;overflow:hidden;transition:background .4s;
    }
    .home-card::before{
      content:'';position:absolute;top:0;left:0;width:100%;height:3px;
      background:var(--white);transform:scaleX(0);transform-origin:left;
      transition:transform .6s var(--ease);
    }
    .home-card:hover{background:var(--grey-800)}
    .home-card:hover::before{transform:scaleX(1)}
    .home-card-title{
      font-family:var(--f-serif);font-size:1.2rem;
      font-style:italic;margin-bottom:8px;
    }
    .home-card-desc{
      font-size:.7rem;color:var(--grey-400);line-height:1.5;
    }

    /* ══════════════════════════════════════════════
       GUIDE CARDS
       ══════════════════════════════════════════════ */
    .guide-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:48px;
    }
    .guide-card{
      padding:44px;background:var(--grey-900);
      text-decoration:none;color:inherit;display:flex;flex-direction:column;
      position:relative;overflow:hidden;transition:background .4s;
    }
    .guide-card::before{
      content:'';position:absolute;top:0;left:0;width:100%;height:3px;
      background:var(--white);transform:scaleX(0);transform-origin:left;
      transition:transform .6s var(--ease);
    }
    .guide-card:hover{background:var(--grey-800)}
    .guide-card:hover::before{transform:scaleX(1)}
    .card-num{
      font-family:var(--f-serif);font-size:3.5rem;font-style:italic;
      color:var(--grey-800);line-height:1;margin-bottom:20px;transition:color .4s;
    }
    .guide-card:hover .card-num{color:var(--white)}
    .card-title{
      font-family:var(--f-serif);font-size:clamp(1.3rem,2vw,1.8rem);
      font-weight:400;font-style:italic;line-height:1.15;margin-bottom:12px;
    }
    .card-desc{font-size:.8rem;line-height:1.7;color:var(--grey-400);flex-grow:1}
    .card-tag{
      margin-top:24px;font-family:var(--f-mono);font-size:.55rem;
      letter-spacing:.2em;text-transform:uppercase;color:var(--grey-400);
      padding-top:14px;border-top:1px solid var(--grey-800);
    }

    /* ══════════════════════════════════════════════
       LISTS
       ══════════════════════════════════════════════ */
    .req-list{list-style:none;padding:0;margin:24px 0}
    .req-list li{
      padding:12px 0 12px 24px;border-bottom:1px solid var(--grey-800);
      font-family:var(--f-sans);font-size:.88rem;line-height:1.6;
      color:var(--grey-200);position:relative;
    }
    .req-list li::before{
      content:'';position:absolute;left:0;top:20px;
      width:6px;height:6px;background:var(--grey-400);border-radius:50%;
    }
    .req-list li:first-child{border-top:1px solid var(--grey-800)}

    .step-list{list-style:none;padding:0;margin:32px 0;counter-reset:step}
    .step-list li{
      counter-increment:step;
      padding:20px 0 20px 60px;border-bottom:1px solid var(--grey-800);
      font-family:var(--f-sans);font-size:.88rem;line-height:1.7;
      color:var(--grey-200);position:relative;
    }
    .step-list li:first-child{border-top:1px solid var(--grey-800)}
    .step-list li::before{
      content:counter(step,decimal-leading-zero);
      position:absolute;left:0;top:20px;
      font-family:var(--f-serif);font-size:1.6rem;font-style:italic;
      color:var(--grey-600);line-height:1;
    }

    /* ══════════════════════════════════════════════
       TEMPLATES
       ══════════════════════════════════════════════ */
    .tpl-label{
      font-family:var(--f-mono);font-size:.55rem;letter-spacing:.2em;
      text-transform:uppercase;color:var(--grey-400);
      margin-top:32px;margin-bottom:8px;
    }
    .tpl{
      background:rgba(255,255,255,.03);border:1px solid var(--grey-800);
      padding:24px 28px;margin:12px 0;
      font-family:var(--f-mono);font-size:.75rem;line-height:1.8;
      color:var(--grey-200);white-space:pre-wrap;
      transition:border-color .3s;
    }
    .tpl:hover{border-color:var(--grey-600)}

    .note{
      font-size:.82rem;line-height:1.7;color:var(--grey-400);
      margin-top:20px;padding:16px 0;
      border-top:1px solid var(--grey-800);font-style:italic;
    }

    /* ══════════════════════════════════════════════
       SERVICES GRID
       ══════════════════════════════════════════════ */
    .svc-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:48px;
    }
    .svc-item{
      padding:28px 24px;background:rgba(255,255,255,.03);
      border:1px solid var(--grey-800);
      transition:background .3s,border-color .3s,transform .3s var(--ease);
    }
    .svc-item:hover{background:rgba(255,255,255,.07);border-color:var(--white);transform:translateY(-3px)}
    .svc-name{font-family:var(--f-mono);font-size:.75rem;font-weight:700;letter-spacing:.04em;margin-bottom:10px}
    .svc-desc{font-size:.72rem;color:var(--grey-400);line-height:1.6;margin-bottom:14px}
    .svc-link{
      display:block;font-family:var(--f-mono);font-size:.6rem;letter-spacing:.08em;
      color:var(--white);text-decoration:none;padding:5px 0;
      border-bottom:1px solid var(--grey-800);transition:padding-left .3s var(--ease);
    }
    .svc-link:hover{padding-left:8px}
    .svc-link::before{content:'\2192\00a0';color:var(--grey-600)}

    /* ══════════════════════════════════════════════
       TIPS
       ══════════════════════════════════════════════ */
    .tip-list{margin-top:48px}
    .tip{
      display:flex;gap:20px;padding:24px 0;
      border-bottom:1px solid var(--grey-800);
      transition:padding-left .4s var(--ease);
    }
    .tip:first-child{border-top:1px solid var(--grey-800)}
    .tip:hover{padding-left:16px}
    .tip-n{
      font-family:var(--f-serif);font-size:1.4rem;font-style:italic;
      color:var(--grey-600);flex-shrink:0;transition:color .3s;
    }
    .tip:hover .tip-n{color:var(--white)}
    .tip-t{font-family:var(--f-sans);font-size:.92rem;font-weight:600;margin-bottom:4px}
    .tip-d{font-size:.82rem;line-height:1.7;color:var(--grey-400)}

    /* ══════════════════════════════════════════════
       FAQ
       ══════════════════════════════════════════════ */
    .faq-item{border-bottom:1px solid var(--grey-800)}
    .faq-item:first-child{border-top:1px solid var(--grey-800)}
    .faq-q{
      display:flex;align-items:center;justify-content:space-between;
      padding:24px 0;cursor:pointer;user-select:none;
      font-family:var(--f-sans);font-size:.92rem;font-weight:500;
      transition:padding-left .4s var(--ease);
    }
    .faq-q:hover{padding-left:12px}
    .faq-q::after{
      content:'+';font-family:var(--f-serif);font-size:1.4rem;font-style:italic;
      color:var(--grey-600);transition:transform .3s var(--ease);flex-shrink:0;margin-left:24px;
    }
    .faq-item.open .faq-q::after{transform:rotate(45deg);color:var(--white)}
    .faq-a{max-height:0;overflow:hidden;transition:max-height .5s var(--ease)}
    .faq-item.open .faq-a{max-height:300px}
    .faq-a-inner{padding:0 0 24px;font-size:.85rem;line-height:1.7;color:var(--grey-400);max-width:55ch}

    /* ══════════════════════════════════════════════
       POLITICS
       ══════════════════════════════════════════════ */
    .pol-q{
      font-family:var(--f-mono);font-size:.75rem;line-height:1.8;
      color:var(--grey-400);padding:24px 28px;
      border-left:3px solid var(--grey-600);margin:32px 0;
    }
    .pol-resp{padding:28px 0;border-bottom:1px solid var(--grey-800)}
    .pol-resp:first-of-type{border-top:1px solid var(--grey-800)}
    .pol-party{
      font-family:var(--f-mono);font-size:.6rem;letter-spacing:.25em;
      text-transform:uppercase;color:var(--grey-400);margin-bottom:10px;
    }
    .pol-text{
      font-family:var(--f-serif);font-size:clamp(1rem,1.4vw,1.2rem);
      font-weight:400;line-height:1.7;color:var(--grey-200);font-style:italic;
    }

    /* ══════════════════════════════════════════════
       SUPPORT BLOCK
       ══════════════════════════════════════════════ */
    .support-box{
      padding:60px;border:1px solid var(--grey-800);
      position:relative;overflow:hidden;margin-top:40px;
    }
    .support-box::before{
      content:'fupp';position:absolute;right:-40px;top:50%;transform:translateY(-50%);
      font-family:var(--f-serif);font-size:18rem;font-style:italic;
      color:var(--grey-900);line-height:1;pointer-events:none;user-select:none;
    }
    .cost-row{display:flex;gap:20px;margin:24px 0 36px;position:relative}
    .cost-item{
      padding:14px 22px;background:rgba(255,255,255,.03);
      border:1px solid var(--grey-800);font-family:var(--f-mono);font-size:.7rem;
    }
    .cost-lbl{color:var(--grey-400);font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
    .cost-val{color:var(--white);font-weight:700}

    /* ══════════════════════════════════════════════
       OPERATORS
       ══════════════════════════════════════════════ */
    .op-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
    .op-pill{
      padding:10px 20px;font-family:var(--f-mono);font-size:.65rem;font-weight:700;
      letter-spacing:.08em;text-decoration:none;transition:all .4s var(--ease);
      background:transparent;color:var(--white);border:1px solid var(--grey-600);
    }
    .op-pill:hover{border-color:var(--white);transform:translateY(-2px)}
    .op-pill.dim{color:var(--grey-400);border-color:var(--grey-800);cursor:default}

    /* ══════════════════════════════════════════════
       PAGE-BOTTOM NAV
       ══════════════════════════════════════════════ */
    .page-nav{
      display:flex;flex-wrap:wrap;justify-content:center;gap:12px;
      padding:60px 48px 48px;
    }
    .page-nav a{
      font-family:var(--f-mono);font-size:.6rem;font-weight:700;
      letter-spacing:.15em;text-transform:uppercase;
      color:var(--grey-400);text-decoration:none;
      padding:10px 20px;border:1px solid var(--grey-800);
      transition:all .3s var(--ease);
    }
    .page-nav a:hover{color:var(--white);border-color:var(--white)}

    /* ══════════════════════════════════════════════
       CONTACT
       ══════════════════════════════════════════════ */
    .contact-title{
      font-family:var(--f-serif);
      font-size:clamp(3.5rem,10vw,12rem);font-weight:400;font-style:italic;
      line-height:.88;letter-spacing:-.03em;margin-bottom:40px;
    }
    .c-link{
      display:inline-flex;align-items:center;gap:10px;
      padding:14px 28px;text-decoration:none;
      font-family:var(--f-mono);font-size:.65rem;font-weight:400;
      letter-spacing:.1em;transition:all .4s var(--ease);
    }
    .c-link svg{width:14px;height:14px;opacity:.6;flex-shrink:0}
    .c-link.c-w{background:var(--white);color:var(--black)}
    .c-link.c-w svg{opacity:.8}
    .c-link.c-w:hover{transform:translateY(-2px);box-shadow:0 20px 60px rgba(255,255,255,.12)}
    .c-link.c-g{background:transparent;color:var(--white);border:1px solid var(--grey-600)}
    .c-link.c-g:hover{border-color:var(--white);transform:translateY(-2px)}

    /* ── Facts list (Om-sidan) ── */
    .facts-list{margin-top:40px;border-top:1px solid var(--grey-800)}
    .fact-row{
      display:flex;justify-content:space-between;align-items:baseline;gap:16px;
      padding:14px 0;border-bottom:1px solid var(--grey-800);
    }
    .fact-label{font-family:var(--f-mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--grey-400);white-space:nowrap}
    .fact-value{font-family:var(--f-sans);font-size:.85rem;color:var(--grey-200);text-align:right}

    /* ══════════════════════════════════════════════
       FOOTER / DISCLAIMER
       ══════════════════════════════════════════════ */
    .disclaimer{
      text-align:center;padding:40px 48px;
      border-top:1px solid var(--grey-800);
      font-family:var(--f-mono);font-size:.6rem;
      letter-spacing:.08em;color:var(--grey-600);line-height:1.8;
    }

    /* ══════════════════════════════════════════════
       KEYFRAMES
       ══════════════════════════════════════════════ */
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

    /* ══════════════════════════════════════════════
       RESPONSIVE
       ══════════════════════════════════════════════ */
    /* ── Banner ── */
    #banner{
      position:fixed;
      top:68px;left:50%;
      z-index:50;
      transform:translateX(-50%) translateY(calc(-100% - 80px));
      transition:transform 1.4s cubic-bezier(.16,1,.3,1);
      background:var(--grey-900);
      padding:14px 28px 10px;
      width:max-content;max-width:calc(100vw - 48px);
      overflow:hidden;
    }
    #banner.show{transform:translateX(-50%) translateY(0)}
    #banner p{
      font-family:var(--f-mono);font-size:.55rem;
      letter-spacing:.25em;text-transform:uppercase;
      color:var(--grey-400);
    }
    #banner-progress{
      position:absolute;bottom:0;left:0;
      height:1px;background:var(--white);width:100%;
    }
    #banner-progress.run{animation:bp 5s linear forwards}
    @keyframes bp{to{width:0}}
    @media(max-width:960px){#banner{top:54px}}

    /* ── Mobile overlay (outside nav — no blend-mode conflict) ── */
    #mobile-menu{
      position:fixed;inset:0;z-index:99;
      background:var(--black);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;
      transition:opacity .4s var(--ease);
    }
    #mobile-menu.open{opacity:1;pointer-events:auto}
    #mobile-menu ul{list-style:none;display:flex;flex-direction:column;gap:36px;text-align:center}
    #mobile-menu a{
      font-family:var(--f-mono);font-size:1rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--white);text-decoration:none;
      position:relative;padding-bottom:2px;
    }
    #mobile-menu a::after{
      content:'';position:absolute;bottom:0;left:0;
      width:0;height:1px;background:var(--white);
      transition:width .4s var(--ease);
    }
    #mobile-menu a:hover::after{width:100%}

    @media(max-width:960px){
      nav{padding:18px 24px}
      .nav-burger{display:flex}
      .nav-links{display:none}
      .page-center{padding:80px 24px 60px}
      .page-content{padding:80px 24px 60px}
      .hero-name{font-size:clamp(3.5rem,18vw,5rem)}
      .home-grid{grid-template-columns:1fr 1fr}
      .guide-grid{grid-template-columns:1fr}
      .svc-grid{grid-template-columns:repeat(2,1fr)}
      .support-box{padding:32px 24px}
      .cost-row{flex-direction:column;gap:8px}
      .page-nav{padding:40px 24px 32px}
    }
    @media(max-width:540px){
      .home-grid{grid-template-columns:1fr}
      .svc-grid{grid-template-columns:1fr}
      .btn-row{flex-direction:column}
    }
  </style>
</head>
<body>

  <div id="cursor"></div>

  <svg style="display:none">
    <symbol id="i-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </symbol>
    <symbol id="i-ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M7 17L17 7M17 7H7M17 7V17"/>
    </symbol>
    <symbol id="i-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </symbol>
  </svg>

  <div id="banner"><p>Arkivet har fått en ny design — Samma innehåll som vanligt.</p><div id="banner-progress"></div></div>
  <nav></nav>
  <div id="mobile-menu" aria-hidden="true"><ul></ul></div>
  <main id="app"></main>

  <script src="content.js"></script>
  <script>
  /* ═══════════════════════════════════════════════════════════════
     HELPERS
     ═══════════════════════════════════════════════════════════════ */
  const $ = s => document.querySelector(s);
  const icon = n => `<svg width="14" height="14"><use href="#i-${n}"/></svg>`;

  const PAGE_DESCS = {
    hem:                 'Din guide till offentlighetsprincipen i Sverige. Lär dig beställa domar, förundersökningsprotokoll, dagboksblad och skydda din integritet.',
    guider:              'Guider för att beställa allmänna handlingar — domar, FUP, dagboksblad och mer.',
    domar:               'Steg-för-steg: Beställ domar gratis via domstol.se med personnummer eller målnummer.',
    fup:                 'Beställ förundersökningsprotokoll (FUP) från tingsrätten eller polisens e-tjänst.',
    dagboksblad:         'Beställ dagboksblad — en förteckning över alla handlingar i ett mål och deras sekretessstatus.',
    belastningsregister: 'Hur du kan komma åt belastningsregistret via allmänna handlingar i ett mål.',
    overklaga:           'Steg-för-steg: Så överklagar du ett nekat beslut om allmänna handlingar till tingsrätt och hovrätt.',
    ovrigt:              'Beställ handlingar från alla svenska myndigheter — polisen, skatteverket, transportstyrelsen och fler.',
    radera:              'Radera dina personuppgifter från MrKoll, Ratsit, Hitta.se, Eniro och andra söktjänster.',
    stalker:             'Tips och råd för att skydda din identitet och dina personuppgifter online.',
    faq:                 'Vanliga frågor om offentlighetsprincipen, att beställa handlingar och vad som gäller.',
    jo:                  'Guide för att anmäla myndighetsmissbruk till JO — Justitieombudsmannen.',
    dokument:            'Utvalda allmänna handlingar — polisens slang-lexikon, förundersökningsprotokoll och mer.',
    kontakt:             'Kontakta Arkivet med frågor, feedback eller felrapporter.',
    om:                  'Om Arkivet — ett privat ideellt initiativ för att göra offentlighetsprincipen tillgänglig.',
    stod:                'Stöd Arkivet och hjälp oss fortsätta driva sajten ideellt.',
  };

  function navLink(path, label) {
    return `<a href="/${path}" data-link>${label}</a>`;
  }
  function bottomNav(links) {
    return `<div class="page-nav">${links.map(l => navLink(l[0], l[1])).join('')}</div>`;
  }

  /* ═══════════════════════════════════════════════════════════════
     BUILD NAV
     ═══════════════════════════════════════════════════════════════ */
  const NAV_LINKS = [
    ['om','Om'],['guider','Guider'],['dokument','Dokument'],['radera','Radera mig'],
    ['stalker','Skydda din information'],['faq','FAQ'],['kontakt','Kontakt'],
  ];
  $('nav').innerHTML = `
    <a href="/" data-link class="nav-logo">${SITE.name}</a>
    <ul class="nav-links">
      ${NAV_LINKS.map(l=>`<li>${navLink(l[0],l[1])}</li>`).join('')}
    </ul>
    <button class="nav-burger" aria-label="Öppna meny"><span></span><span></span><span></span></button>`;
  $('#mobile-menu ul').innerHTML = NAV_LINKS.map(l=>`<li><a href="/${l[0]}" data-link>${l[1]}</a></li>`).join('');

  /* ═══════════════════════════════════════════════════════════════
     BUILD PAGES
     ═══════════════════════════════════════════════════════════════ */
  const pages = {};

  /* ── HEM ──────────────────────────────────────────────────────── */
  pages.hem = `
    <div class="page-center">
      <div class="page-bg" aria-hidden="true">fupp</div>
      <h1 class="hero-name fi"><span>${SITE.name}</span></h1>
      <p class="subtitle fi d2" style="max-width:500px;margin-bottom:48px">${SITE.hero.sub}</p>
      <div class="home-grid fi d3">
        ${[
          ['guider','Guider','Beställ domar, FUP, dagboksblad och mer'],
          ['radera','Radera mig','Ta bort dina uppgifter från söktjänster'],
          ['stalker','Skydda din information','Tips för att skydda din identitet'],
          ['jo','JO-anmälan','Anmäl felaktig myndighetsbehandling'],
          ['faq','Vanliga frågor','Svar på de vanligaste frågorna'],
          ['kontakt','Kontakt','Feedback, frågor och önskemål'],
          ['dokument','Dokument','Utvalda allmänna handlingar'],
          ['stod','Stöd Arkivet','Hjälp oss fortsätta driva sidan'],
          ['om','Om Arkivet','Syfte och bakgrund'],
        ].map(c => `
          <a href="/${c[0]}" data-link class="home-card">
            <div class="home-card-title">${c[1]}</div>
            <div class="home-card-desc">${c[2]}</div>
          </a>`).join('')}
      </div>
      <p style="position:absolute;bottom:32px;left:0;right:0;font-family:var(--f-mono);font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--grey-600);text-align:center">Arkivet är ett privat initiativ. Allt faktainnehåll är manuellt framtaget, men kan ändå innehålla felaktigheter.</p>
    </div>`;

  /* ── OM ──────────────────────────────────────────────────────── */
  pages.om = `
    <div class="page-content">
      <div class="label fi">Om Arkivet</div>
      <h2 class="title fi d1">${SITE.about.title[0]}<br><em>${SITE.about.title[1]}</em></h2>
      <p class="prose-serif fi d2">Arkivet hjälper dig att navigera <strong>offentlighetsprincipen</strong> — från att beställa domar och förundersökningsprotokoll till att skydda din integritet online.</p>
      <p class="prose-serif fi d3">Sajten är ett privat initiativ, är inte kopplad till någon politisk organisation och drivs helt <strong>ideellt</strong>.</p>
      <p class="prose-serif fi d4">Arkivet samlar inte in personuppgifter. Anonym besöksstatistik samlas in via Umami Analytics — inga cookies används och ingen data kan kopplas till dig som individ. Ingen data säljs vidare.</p>
    </div>
    ${bottomNav([['guider','Guider'],['kontakt','Kontakt']])}`;

  /* ── DOKUMENT ────────────────────────────────────────────────── */
  pages.dokument = `
    <div class="page-content">
      <div class="label fi">Dokument</div>
      <h2 class="title fi d1">Allmänna<br><em>handlingar</em></h2>
      <p class="prose-serif fi d2">${SITE.dokument.intro}</p>
      <div style="margin-top:48px;display:flex;flex-direction:column;gap:2px">
        ${SITE.dokument.items.map((d,i)=>`
          <a href="${d.url}" target="_blank" rel="noopener" class="fi d${i+3}" style="display:block;padding:32px;background:var(--grey-900);text-decoration:none;color:inherit;transition:background .3s" onmouseenter="this.style.background='var(--grey-800)'" onmouseleave="this.style.background='var(--grey-900)'">
            <div style="display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:10px">
              <span style="font-family:var(--f-serif);font-size:1.3rem;font-style:italic">${d.title}</span>
              <span style="font-family:var(--f-mono);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--grey-400);white-space:nowrap">${icon('ext')} Öppna</span>
            </div>
            <p style="font-size:.8rem;color:var(--grey-400);line-height:1.6;margin:0">${d.desc}</p>
          </a>`).join('')}
      </div>
    </div>
    ${bottomNav([['hem','Hem']])}`;

  /* ── GUIDER (ÖVERSIKT) ───────────────────────────────────────── */
  pages.guider = `
    <div class="page-content">
      <div class="label fi">Guider</div>
      <h2 class="title fi d1">Beställ<br><em>handlingar</em></h2>
      <p class="prose-serif fi d2">${SITE.about.paragraphs[0]}</p>
      <div class="guide-grid fi d3">
        ${SITE.guides.map((g, i) => `
          <a href="/${g.id}" data-link class="guide-card">
            <span class="card-num">0${i+1}</span>
            <h3 class="card-title">${g.title}</h3>
            <p class="card-desc">${g.desc}</p>
            <span class="card-tag">${g.tag}</span>
          </a>`).join('')}
      </div>
    </div>
    ${bottomNav([['hem','Hem']])}`;

  /* ── GUIDE DETAIL RENDERER ───────────────────────────────────── */
  function guideHTML(key, num) {
    const g = SITE[key];
    if (!g) return '';
    let h = '';

    if (g.intro)         h += `<p class="prose fi d2">${g.intro}</p>`;
    if (g.requirements)  h += `<ul class="req-list fi d3">${g.requirements.map(r=>`<li>${r}</li>`).join('')}</ul>`;
    if (g.note)          h += `<p class="prose fi d3">${g.note}</p>`;
    if (key === 'domar' && g.links && g.links.length) {
      h += `<div class="btn-row fi d4">${g.links.map((l,i) =>
        `<a href="${l.url}" target="_blank" rel="noopener" class="btn ${i===0?'btn-w':'btn-o'}">${icon('ext')} ${l.label}</a>`
      ).join('')}</div>`;
    }
    if (g.paragraphs)    h += g.paragraphs.map((p,i)=>`<p class="prose fi d${i+2}">${p}</p>`).join('');
    if (g.steps) {
      h += `<div class="tpl-label fi d4">Steg-för-steg</div>`;
      const stepImgs = key === 'domar' ? {
        2: ['dom-steg2.png'],
        3: ['dom-steg3.png'],
        4: ['dom-steg4.1.png','dom-steg4.2.png'],
        5: ['dom-steg5.png'],
        6: ['dom-steg6.png'],
        7: ['dom-steg7.png'],
      } : {};
      h += `<ol class="step-list fi d4">${g.steps.map((s,i)=>{
        const imgs = stepImgs[i+1] || [];
        const imgHTML = imgs.map(src=>`<img src="${src}" alt="" style="display:block;width:100%;max-width:480px;margin-top:16px;border:1px solid var(--grey-800);">`).join('');
        return `<li>${s}${imgHTML}</li>`;
      }).join('')}</ol>`;
    }
    if (g.templateIntro) h += `<p class="prose fi d4">${g.templateIntro}</p>`;
    if (g.templates) {
      h += `<div class="tpl-label fi d5">E-postmallar</div>`;
      h += g.templates.map(t=>`<div class="tpl fi d5">${t}</div>`).join('');
    }
    if (g.templateNote)  h += `<p class="note fi d6">${g.templateNote}</p>`;
    if (g.followUp) {
      h += `<p class="prose fi d6">${g.followUp}</p>`;
      if (g.followUpTemplate) h += `<div class="tpl fi d6">${g.followUpTemplate}</div>`;
    }
    if (g.denied)        h += `<p class="note fi d7">${g.denied}</p>`;
    if (g.polisNote)     h += `<p class="prose fi d7">${g.polisNote}</p>`;
    if (key !== 'domar' && g.links && g.links.length) {
      h += `<div class="btn-row fi d7">${g.links.map((l,i) =>
        `<a href="${l.url}" target="_blank" rel="noopener" class="btn ${i===0?'btn-w':'btn-o'}">${icon('ext')} ${l.label}</a>`
      ).join('')}</div>`;
    }

    return `
      <div class="page-content">
        <div class="label fi">Guide 0${num}</div>
        <h2 class="title-sm fi d1">${g.title}</h2>
        ${g.updated ? `<p class="fi d1" style="font-family:var(--f-mono);font-size:.65rem;color:var(--grey-600);letter-spacing:.1em;margin:0 0 8px">Uppdaterad ${g.updated}</p>` : ''}
        ${h}
      </div>
      ${bottomNav([['guider','Guider'],['hem','Hem']])}`;
  }

  pages.domar              = guideHTML('domar', 1);
  pages.fup                = guideHTML('fup', 2);
  pages.dagboksblad        = guideHTML('dagboksblad', 3);
  pages.belastningsregister = guideHTML('belastningsregister', 4);
  pages.overklaga          = guideHTML('overklaga', 5);
  pages.ovrigt             = guideHTML('ovrigt', 6);

  /* ── RADERA MIG ──────────────────────────────────────────────── */
  const priv = SITE.privacy;
  pages.radera = `
    <div class="page-content">
      <div class="label fi">Integritet</div>
      <h2 class="title fi d1">${priv.title.join('<br>')}</h2>
      <p class="prose-serif fi d2">${priv.intro}</p>

      <div class="svc-grid fi d3">
        ${priv.services.map(s => `
          <div class="svc-item">
            <div class="svc-name">${s.name}</div>
            <div class="svc-desc">${s.desc}</div>
            ${s.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener" class="svc-link">${l.label}</a>`).join('')}
          </div>`).join('')}
      </div>

      <div class="tpl-label fi d4">E-postmall för raderingsbegäran</div>
      <div class="tpl fi d4">${priv.emailTemplate}</div>

      <div style="margin-top:56px" class="fi d5">
        <div class="tpl-label">Ytterligare skydd</div>
        ${priv.extraProtection.map(e => `
          <div class="tip" style="border-top:1px solid var(--grey-800)">
            <span class="tip-n">&rarr;</span>
            <div>
              <div class="tip-t"><a href="${e.url}" target="_blank" rel="noopener" style="color:var(--white);text-decoration:none;border-bottom:1px solid var(--grey-600)">${e.name}</a></div>
              <div class="tip-d">${e.desc}</div>
            </div>
          </div>`).join('')}

        <div class="tpl-label" style="margin-top:36px">Gör ditt telefonnummer hemligt</div>
        <div class="op-grid">
          ${priv.operators.map(o =>
            o.url
              ? `<a href="${o.url}" target="_blank" rel="noopener" class="op-pill">${o.name}</a>`
              : `<span class="op-pill dim" title="${o.note}">${o.name}</span>`
          ).join('')}
        </div>
      </div>
    </div>
    ${bottomNav([['stalker','Skydda din information'],['hem','Hem']])}`;

  /* ── STALKER ─────────────────────────────────────────────────── */
  const stk = SITE.stalker;
  pages.stalker = `
    <div class="page-content">
      <div class="label fi">Säkerhet</div>
      <h2 class="title fi d1">${stk.title.join('<br>')}</h2>
      <p class="prose-serif fi d2">${stk.intro}</p>
      <div class="tip-list fi d3">
        ${stk.tips.map((t,i) => `
          <div class="tip">
            <span class="tip-n">0${i+1}</span>
            <div><div class="tip-t">${t.title}</div><div class="tip-d">${t.desc}</div></div>
          </div>`).join('')}
      </div>
    </div>
    ${bottomNav([['radera','Radera mig'],['hem','Hem']])}`;

  /* ── JO ──────────────────────────────────────────────────────── */
  const jo = SITE.jo;
  pages.jo = `
    <div class="page-content">
      <div class="label fi">Juridik</div>
      <h2 class="title fi d1">${jo.title}</h2>
      <p class="prose-serif fi d2">${jo.text}</p>
      <div class="btn-row fi d3">
        <a href="${jo.link.url}" target="_blank" rel="noopener" class="btn btn-w">${icon('ext')} ${jo.link.label}</a>
      </div>
    </div>
    ${bottomNav([['overklaga','Överklaga'],['guider','Guider'],['hem','Hem']])}`;

  /* ── FAQ ──────────────────────────────────────────────────────── */
  pages.faq = `
    <div class="page-content">
      <div class="label fi">Vanliga frågor</div>
      <h2 class="title fi d1">FAQ</h2>
      <div class="fi d2">
        ${SITE.faq.map(f => `
          <div class="faq-item">
            <div class="faq-q">${f.q}</div>
            <div class="faq-a"><div class="faq-a-inner">${f.a}</div></div>
          </div>`).join('')}
      </div>
    </div>
    ${bottomNav([['guider','Guider'],['hem','Hem']])}`;

  /* ── POLITIK ─────────────────────────────────────────────────── */
  /* ── STÖD ────────────────────────────────────────────────────── */
  const sup = SITE.support;
  pages.stod = `
    <div class="page-content">
      <div class="label fi">Stöd</div>
      <h2 class="title fi d1">Stöd<br>Arkivet</h2>
      <div class="support-box fi d2">
        <p class="prose-serif" style="position:relative">${sup.text}</p>
        <div class="cost-row">
          ${sup.costs.map(c => `
            <div class="cost-item">
              <div class="cost-lbl">${c.item}</div>
              <div class="cost-val">${c.cost}</div>
            </div>`).join('')}
        </div>
        <div class="btn-row" style="margin-top:24px;position:relative">
          ${sup.links.map((l,i) => `
            <a href="${l.url}" target="_blank" rel="noopener" class="btn ${i===0?'btn-w':'btn-o'}">${icon('heart')} ${l.label}</a>`).join('')}
        </div>
      </div>

    </div>
    ${bottomNav([['hem','Hem']])}`;

  /* ── KONTAKT ─────────────────────────────────────────────────── */
  pages.kontakt = `
    <div class="page-center">
      <div class="label fi" style="justify-content:center">Kontakt</div>
      <h2 class="contact-title fi d1">Kontakta<br>oss</h2>
      <p class="subtitle fi d2" style="max-width:500px;margin-bottom:48px">Frågor, feedback eller hittat något fel? Kontakta Arkivet.</p>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:12px" class="fi d3">
        <a href="mailto:${SITE.email}" class="c-link c-w">${icon('mail')} ${SITE.email}</a>
      </div>
    </div>
    ${bottomNav([['hem','Hem']])}`;

  /* ── DISCLAIMER ──────────────────────────────────────────────── */
  pages.disclaimer = `
    <div class="page-content" style="display:flex;flex-direction:column;justify-content:center;min-height:80dvh">
      <div class="label fi">Disclaimer</div>
      <h2 class="title-sm fi d1">Disclaimer</h2>
      <p class="prose fi d2"><strong>${SITE.disclaimer}</strong></p>
      <p class="prose fi d3">Har du hittat felaktig information eller vill komma i kontakt med oss, skicka ett mejl till <a href="mailto:${SITE.email}" style="color:var(--white)">${SITE.email}</a>.</p>
      <p class="prose fi d4" style="color:var(--grey-600)">Senast uppdaterad: ${SITE.lastUpdated}</p>
    </div>
    ${bottomNav([['hem','Hem']])}`;

  /* ═══════════════════════════════════════════════════════════════
     JSON-LD STRUCTURED DATA
     ═══════════════════════════════════════════════════════════════ */
  (function(){
    const ld = document.createElement('script');
    ld.type = 'application/ld+json';
    ld.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://fupp.se/#website",
          "url": "https://fupp.se/",
          "name": "Arkivet",
          "description": "Din guide till offentlighetsprincipen i Sverige.",
          "inLanguage": "sv"
        },
        {
          "@type": "FAQPage",
          "@id": "https://fupp.se/faq",
          "mainEntity": SITE.faq.map(f => ({
            "@type": "Question",
            "name": f.q,
            "acceptedAnswer": {"@type": "Answer", "text": f.a}
          }))
        }
      ]
    });
    document.head.appendChild(ld);
  })();

  /* ═══════════════════════════════════════════════════════════════
     INJECT PAGES
     ═══════════════════════════════════════════════════════════════ */
  const app = $('#app');
  Object.keys(pages).forEach(id => {
    const section = document.createElement('section');
    section.className = 'page';
    section.dataset.page = id;
    section.innerHTML = pages[id];
    app.appendChild(section);
  });

  /* ═══════════════════════════════════════════════════════════════
     ROUTER
     ═══════════════════════════════════════════════════════════════ */
  let currentPage = null;

  function navigate(id, push = true) {
    if (!pages[id]) id = 'hem';
    if (id === currentPage) return;

    const prev = currentPage ? app.querySelector(`[data-page="${currentPage}"]`) : null;
    const next = app.querySelector(`[data-page="${id}"]`);
    if (!next) return;

    if (prev) prev.classList.remove('active');

    // Reset animations: briefly remove active so CSS animation restarts on re-entry
    next.classList.remove('active');
    next.scrollTop = 0;
    void next.offsetWidth; // force reflow
    next.classList.add('active');

    currentPage = id;
    document.body.classList.toggle('on-hem', id === 'hem');

    const url = id === 'hem' ? '/' : '/' + id;
    if (push) history.pushState({id}, '', url);

    const desc = PAGE_DESCS[id] || PAGE_DESCS.hem;
    document.querySelector('meta[name="description"]').content = desc;
    document.querySelector('meta[property="og:url"]').content = 'https://fupp.se' + url;
    document.querySelector('link[rel="canonical"]').href = 'https://fupp.se' + url;

    document.title = id === 'hem'
      ? 'Arkivet — fupp.se'
      : `${next.querySelector('.title,.title-sm,.contact-title,.hero-name')?.textContent?.trim() || id} — fupp.se`;
  }

  // delegate all internal links
  document.addEventListener('click', e => {
    const a = e.target.closest('a[data-link]');
    if (!a) return;
    const href = a.getAttribute('href');
    if (!href || !href.startsWith('/')) return;
    if (a.hasAttribute('target')) return;
    e.preventDefault();
    navigate(href.slice(1) || 'hem');
  });

  // back/forward
  window.addEventListener('popstate', e => {
    navigate(e.state?.id || location.pathname.slice(1) || 'hem', false);
  });

  // initial route
  try {
    navigate(location.pathname.slice(1) || 'hem', false);
  } catch(e) {
    console.error('Navigate error:', e);
    const first = document.querySelector('.page');
    if (first) first.style.display = 'block';
  }

  /* ═══════════════════════════════════════════════════════════════
     INTERACTIVITY
     ═══════════════════════════════════════════════════════════════ */

  /* ── Mobile menu ─────────────────────────────────────────────── */
  const navEl = $('nav');
  const mobileMenu = $('#mobile-menu');
  const burger = navEl.querySelector('.nav-burger');
  function closeMobileMenu(){
    mobileMenu.classList.remove('open');
    mobileMenu.setAttribute('aria-hidden','true');
    navEl.classList.remove('menu-open');
  }
  burger.addEventListener('click',()=>{
    const open = !mobileMenu.classList.contains('open');
    mobileMenu.classList.toggle('open',open);
    mobileMenu.setAttribute('aria-hidden', open ? 'false' : 'true');
    navEl.classList.toggle('menu-open',open);
  });
  mobileMenu.addEventListener('click',e=>{
    if(e.target.closest('a')) closeMobileMenu();
  });

  /* ── Cursor ──────────────────────────────────────────────────── */
  const cursor = $('#cursor');
  let cx=0,cy=0,tx=0,ty=0;
  document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY});
  (function loop(){
    cx+=(tx-cx)*.35;cy+=(ty-cy)*.35;
    cursor.style.left=cx+'px';cursor.style.top=cy+'px';
    requestAnimationFrame(loop);
  })();
  document.addEventListener('mouseover',e=>{
    if(e.target.closest('a,button,.guide-card,.home-card,.svc-item,.tip,.faq-q,.op-pill:not(.dim)'))
      cursor.classList.add('expand');
    else cursor.classList.remove('expand');
  });


  /* ── Card 3D tilt ────────────────────────────────────────────── */
  document.addEventListener('mousemove',e=>{
    const card=e.target.closest('.guide-card,.home-card');
    if(!card)return;
    const r=card.getBoundingClientRect();
    card.style.transition='transform .08s ease,background .4s';
    card.style.transform=`perspective(800px) rotateX(${((e.clientY-r.top)/r.height-.5)*-4}deg) rotateY(${((e.clientX-r.left)/r.width-.5)*4}deg)`;
  });
  document.addEventListener('mouseout',e=>{
    const card=e.target.closest('.guide-card,.home-card');
    if(!card)return;
    card.style.transition='transform .6s cubic-bezier(.16,1,.3,1),background .4s';
    card.style.transform='';
  });

  /* ── FAQ accordion ──────────────────────────────────────────── */
  document.addEventListener('click',e=>{
    const q=e.target.closest('.faq-q');
    if(!q)return;
    const item=q.parentElement;
    const open=item.classList.contains('open');
    document.querySelectorAll('.faq-item.open').forEach(el=>el.classList.remove('open'));
    if(!open)item.classList.add('open');
  });

  /* ── Magnetic buttons ────────────────────────────────────────── */
  document.addEventListener('mousemove',e=>{
    const btn=e.target.closest('.btn,.c-link');
    if(!btn)return;
    const r=btn.getBoundingClientRect();
    btn.style.transform=`translate(${(e.clientX-r.left-r.width/2)*.12}px,${(e.clientY-r.top-r.height/2)*.12}px)`;
  });
  document.addEventListener('mouseout',e=>{
    const btn=e.target.closest('.btn,.c-link');
    if(!btn)return;
    btn.style.transition='transform .5s cubic-bezier(.16,1,.3,1)';
    btn.style.transform='';
    setTimeout(()=>btn.style.transition='',500);
  });

  /* ── Banner ──────────────────────────────────────────────────── */
  (function(){
    const b = $('#banner'), p = $('#banner-progress');
    setTimeout(()=>{
      b.classList.add('show');
      setTimeout(()=>{
        p.classList.add('run');
        setTimeout(()=>b.classList.remove('show'), 5000);
      }, 700);
    }, 600);
  })();

  /* ── Touch ───────────────────────────────────────────────────── */
  if('ontouchstart' in window){
    document.body.style.cursor='auto';
    cursor.style.display='none';
    burger.style.cursor='pointer';
  }
  </script>
</body>
</html>
